name: Continuous Integration

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test-typescript:
    name: TypeScript Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        id: checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        id: setup-node
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: npm

      - name: Install Dependencies
        id: npm-ci
        run: npm ci

      - name: Check Format
        id: npm-format-check
        run: npm run format:check

      - name: Lint
        id: npm-lint
        run: npm run lint

      - name: Test
        id: npm-test
        run: npm run test

  test-action:
    name: GitHub Actions Test
    runs-on: ubuntu-latest
    # The action only runs on pull requests; skip on push to main
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout
        id: checkout
        uses: actions/checkout@v4

      - name: Test Local Action
        id: test-action
        uses: ./

      - name: Print Output
        id: output
        run: |
          echo "${{ steps.test-action.outputs.grouped-owners }}"
          echo "${{ steps.test-action.outputs.individual-owners }}"

  release-action:
    needs: test-typescript
    # Only release on push to main, not on pull requests
    if: github.event_name == 'push'
    permissions:
      contents: write
    name: Release
    uses: ./.github/workflows/release.yml
    secrets: inherit
